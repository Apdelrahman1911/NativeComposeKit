name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Never cancel an in-flight main build; superseded PR pushes are fair game.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  android:
    name: ABI lock, tests, lint, Android build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Run the shared gate
        # Note: on Linux the binary-compatibility-validator can only verify the JVM .api dump — the
        # Apple klib halves are validated by the macOS job below. assembleRelease keeps the release
        # variant (minify config, lintVital) honest — debug-only CI let release breakage land unseen.
        run: >
          ./gradlew
          :nativecomposekit:apiCheck
          :nativecomposekit:testDebugUnitTest
          :composeApp:testDebugUnitTest
          :nativecomposekit:lintDebug
          :composeApp:lintDebug
          :composeApp:assembleDebug
          :composeApp:assembleRelease

  ios:
    name: iOS Kotlin targets + app build
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Cache the Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - name: Select the newest Xcode on the image
        # Compose Multiplatform 1.11's framework references iOS 26 SDK symbols (e.g. UIViewLayoutRegion),
        # so the app link needs the newest toolchain the runner ships, not the image default.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
      - name: Compile iOS targets and verify the full multiplatform ABI lock
        # apiCheck here validates the klib dumps too — the Linux job can't compile Apple targets, so
        # its klib half is inert; this is the run that actually locks the iOS-facing API.
        # linkDebugFrameworkIosArm64 links the DEVICE-arch framework: xcodebuild below only links the
        # simulator slice, so export-list/linker breakage for real iPhones was previously invisible.
        run: >
          ./gradlew
          :composeApp:compileKotlinIosSimulatorArm64
          :composeApp:compileKotlinIosArm64
          :composeApp:linkDebugFrameworkIosArm64
          :nativecomposekit:apiCheck
      - name: Run the shared tests on the iOS simulator target
        # Both modules: the kit's tests AND the sample's navigator/chrome/data tests run as real
        # Kotlin/Native code here (the Linux job runs them on the JVM only).
        run: ./gradlew :nativecomposekit:iosSimulatorArm64Test :composeApp:iosSimulatorArm64Test
      - name: Smoke-publish the full multiplatform artifact set
        run: ./gradlew :nativecomposekit:publishToMavenLocal
      - name: Build the iOS app (simulator, unsigned)
        run: |
          command -v xcodegen >/dev/null || brew install xcodegen
          cd iosApp
          xcodegen generate
          DEVICE=$(xcrun simctl list devices available --json | jq -r '[.devices[] | .[] | select(.isAvailable and (.name | startswith("iPhone")))][0].name // empty')
          if [ -z "$DEVICE" ]; then echo "No available iPhone simulator on the image"; exit 1; fi
          echo "Building against simulator: $DEVICE"
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO build
