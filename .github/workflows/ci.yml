name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: ABI lock, tests, lint, Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Run the shared gate
        run: >
          ./gradlew
          :nativecomposekit:apiCheck
          :nativecomposekit:testDebugUnitTest
          :composeApp:testDebugUnitTest
          :nativecomposekit:lintDebug
          :composeApp:lintDebug
          :composeApp:assembleDebug

  ios:
    name: iOS Kotlin targets + app build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Select the newest Xcode on the image
        # Compose Multiplatform 1.11's framework references iOS 26 SDK symbols (e.g. UIViewLayoutRegion),
        # so the app link needs the newest toolchain the runner ships, not the image default.
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
      - name: Compile both iOS Kotlin targets
        run: ./gradlew :composeApp:compileKotlinIosSimulatorArm64 :composeApp:compileKotlinIosArm64
      - name: Build the iOS app (simulator, unsigned)
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate
          DEVICE=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Building against simulator: $DEVICE"
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO build
