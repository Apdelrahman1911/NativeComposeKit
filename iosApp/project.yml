name: iosApp
options:
  bundleIdPrefix: io.github.apdelrahman1911.nativecomposekit
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    # The Kotlin framework is linked from build/ by the Gradle embed script below; Xcode's
    # user-script sandbox would otherwise block it ("Operation not permitted").
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_VERSION: "5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    configFiles:
      Debug: iosApp/Configuration/Config.xcconfig
      Release: iosApp/Configuration/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        PRODUCT_NAME: $(APP_NAME)
        DEVELOPMENT_TEAM: $(TEAM_ID)
        INFOPLIST_FILE: iosApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        # Standard KMP+Compose template path: where the embed-and-sign Gradle task drops the framework.
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - framework: ComposeApp.framework
        embed: true
        codeSign: true
        implicit: true
    preBuildScripts:
      - name: "Build & embed Kotlin/Compose framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
